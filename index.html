<!DOCTYPE html>
<html lang="id">
<body>
  <div id="layar-login">
    <input type="text" id="nim" placeholder="Masukkan NIM" />
    <button onclick="cekLogin()">Masuk</button>
  </div>
  <script>
    function cekLogin() {
      const nim = document.getElementById('nim').value;
      if (nim === "123456") { // Ganti dengan NIM dari database Anda
        alert("Berhasil!");
      } else {
        alert("NIM tidak ditemukan.");
      }
    }
  </script>
</body>
</html>
